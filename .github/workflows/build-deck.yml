name: Build PowerPoint deck

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Build deck
        run: npm run build
      - name: Upload deck artifact
        uses: actions/upload-artifact@v4
        with:
          name: aionos-portek-remade-deck
          path: dist/AIonOS_Portek_Remade_Deck.pptx
